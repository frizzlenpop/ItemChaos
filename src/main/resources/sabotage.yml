# ==============================================
# Sabotage System Configuration
# ==============================================

# Global settings
enabled: true
# Whether to broadcast sabotage events to all players
broadcast-sabotages: true
# Whether sabotage shield deflection is enabled
shield-deflection-enabled: true
# Deflection chances per shield level (level 1, 2, 3)
shield-deflect-chances:
  - 0.15
  - 0.30
  - 0.50

# Per-sabotage configuration
# Each sabotage can have: cost, duration (seconds), enabled
